<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>LedgerLoop — Daily Business Account Book</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1931">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LedgerLoop">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&display=swap" rel="stylesheet">
<script src="libs/chart.umd.min.js" defer></script>
<script src="libs/jspdf.umd.min.js" defer></script>
<style>
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface-2:#EDF1F5;
  --primary:#0A1931;
  --primary-dark:#070F1F;
  --primary-light:#C7D2DC;
  --gold:#5B6B7D;
  --gold-light:#E9ECF0;
  --income:#2F7D4F;
  --income-light:#E6F1EA;
  --expense:#A73838;
  --expense-light:#F8E9E9;
  --credit-given:#5B6B7D;
  --credit-given-light:#E9ECF0;
  --credit-received:#0A1931;
  --credit-received-light:#EDF1F5;
  --text:#0A1931;
  --text-muted:#5B6B7D;
  --text-faint:#9AA5B1;
  --border:#E1E6EC;
  --shadow:0 2px 10px rgba(10,25,49,.08);
  --shadow-lg:0 14px 34px rgba(10,25,49,.14);
  --radius:18px;
  --radius-sm:12px;
  --font-display:'Fraunces',serif;
  --font-body:'Inter',system-ui,sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-lang="ta"]{ --font-display:'Noto Sans Tamil','Fraunces',serif; --font-body:'Noto Sans Tamil','Inter',system-ui,sans-serif; }
body.dark{
  --bg:#070F1F;
  --surface:#101F38;
  --surface-2:#16283F;
  --primary:#C7D2DC;
  --primary-dark:#8C97A6;
  --primary-light:#16283F;
  --gold-light:#16283F;
  --income-light:#16281D;
  --expense-light:#2E1B1B;
  --credit-given-light:#16283F;
  --credit-received-light:#16283F;
  --text:#F2F5F8;
  --text-muted:#A8B4C2;
  --text-faint:#5B6B7D;
  --border:#1D3350;
  --shadow:0 2px 10px rgba(0,0,0,.35);
  --shadow-lg:0 14px 34px rgba(0,0,0,.5);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
body{margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); overscroll-behavior-y:none;}
#root{max-width:480px; margin:0 auto; min-height:100vh; position:relative; background:var(--bg); padding-bottom:calc(84px + var(--safe-bottom));}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.hide-scroll{scrollbar-width:none; -webkit-overflow-scrolling:touch;}
.screen{scroll-behavior:smooth;}

/* HEADER */
.header{
  background:linear-gradient(135deg, #070F1F 0%, #0A1931 55%, #2B3F58 100%);
  color:#fff; padding:18px 18px 60px; position:relative; overflow:hidden;
}
.header::after{content:"";position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.07);}
.header::before{content:"";position:absolute; left:-30px; bottom:-60px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.06);}
.header-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.biz-name{font-family:var(--font-display); font-weight:700; font-size:20px; margin:0;}
.greeting{font-size:13px; opacity:.85; margin-top:2px;}
.header-actions{display:flex; gap:8px;}
.icon-btn{width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.18); border:none; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px;}
.date-pill{display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.16); padding:6px 12px; border-radius:20px; font-size:12px; margin-top:12px; position:relative; z-index:1;}

/* SUMMARY CARDS - overlapping header */
.summary-scroll{display:flex; gap:12px; overflow-x:auto; padding:0 18px; margin-top:-42px; position:relative; z-index:2;}
.summary-card{
  min-width:132px; background:var(--surface); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow-lg); flex-shrink:0; border:1px solid var(--border);
}
.summary-card .label{font-size:11px; color:var(--text-muted); font-weight:600;}
.summary-card .val{font-family:var(--font-display); font-size:19px; font-weight:700; margin-top:4px; font-variant-numeric:tabular-nums;}
.summary-card .dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px;}

/* SECTION */
.section{padding:20px 18px 4px;}
.section-title{font-family:var(--font-display); font-size:16px; font-weight:700; margin:0 0 12px;}
.section-title-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
.link-btn{color:var(--primary); font-size:13px; font-weight:600; background:none; border:none;}

/* QUICK ACTIONS */
.qa-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.qa-card{border-radius:var(--radius); padding:18px 16px; text-align:left; border:none; display:flex; flex-direction:column; gap:26px; box-shadow:var(--shadow); transition:transform .15s; min-height:104px;}
.qa-card:active{transform:scale(.96);}
.qa-icon{width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:28px; background:rgba(255,255,255,.55);}
.qa-label{font-weight:700; font-size:16px; font-family:var(--font-body); color:var(--text);}
.qa-in{background:var(--income-light);} .qa-out{background:var(--expense-light);}
.qa-cg{background:var(--credit-given-light);} .qa-cr{background:var(--credit-received-light);}
.qa-full{grid-column:span 2; flex-direction:row; align-items:center; justify-content:space-between; background:var(--surface-2);}

/* TX LIST */
.tx-item{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-ico{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
.tx-mid{flex:1; min-width:0;}
.tx-title{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.tx-sub{font-size:12px; color:var(--text-muted); margin-top:2px;}
.tx-amt{font-family:var(--font-display); font-weight:700; font-size:15px; font-variant-numeric:tabular-nums; flex-shrink:0;}
.empty-state{text-align:center; padding:40px 20px; color:var(--text-muted);}
.empty-state .em-ico{font-size:40px; margin-bottom:10px;}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
  background:var(--surface); border-top:1px solid var(--border); display:flex; padding:8px 4px calc(8px + var(--safe-bottom));
  z-index:40; box-shadow:0 -4px 16px rgba(0,0,0,.05);
}
.nav-btn{flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; color:var(--text-faint); font-size:12px; font-weight:700; min-height:56px;}
.nav-btn.active{color:var(--primary);}
.nav-ico{font-size:25px;}

/* SCREENS (bottom sheet full pages) */
.screen{position:fixed; inset:0; z-index:60; background:var(--bg); display:none; max-width:480px; margin:0 auto; overflow-y:auto;}
.screen.open{display:block; animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.screen-header{position:sticky; top:0; background:var(--surface); z-index:5; display:flex; align-items:center; gap:12px; padding:16px 16px; border-bottom:1px solid var(--border);}
.screen-title{font-family:var(--font-display); font-weight:700; font-size:17px; margin:0;}
.back-btn{width:36px; height:36px; border-radius:50%; border:none; background:var(--surface-2); font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--text);}
.screen-body{padding:18px 18px 40px;}

/* FORMS */
.amount-display{text-align:center; padding:20px 0 10px;}
.amount-display .cur{font-size:22px; font-weight:700; color:var(--text-muted); vertical-align:top;}
.amount-display .amt{font-family:var(--font-display); font-size:46px; font-weight:700; font-variant-numeric:tabular-nums;}
.mic-btn{width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); font-size:16px; display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; margin-left:10px;}
.mic-btn.listening{background:var(--expense-light); border-color:var(--expense); animation:micPulse 1s infinite;}
@keyframes micPulse{0%,100%{opacity:1;} 50%{opacity:.5;}}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.02em;}
.field input, .field select, .field textarea{
  width:100%; padding:13px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:15px; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.chip-row{display:flex; flex-wrap:wrap; gap:8px;}
.chip{padding:9px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; color:var(--text-muted);}
.chip.selected{background:var(--primary); border-color:var(--primary); color:#fff;}
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;}
.key{padding:16px 0; border-radius:14px; background:var(--surface-2); border:none; font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--text);}
.key:active{background:var(--primary-light);}
.key.fn{font-size:16px; color:var(--primary);}
.voice-btn{position:absolute; right:0; top:0; width:40px; height:40px; border-radius:50%; background:var(--primary-light); color:var(--primary); border:none; font-size:16px;}
.field-wrap{position:relative;}
.btn-primary{width:100%; padding:15px; border-radius:var(--radius-sm); background:var(--primary); color:#fff; border:none; font-weight:600; font-size:14px; font-family:var(--font-body); letter-spacing:.04em; text-transform:uppercase; box-shadow:var(--shadow);}
.btn-secondary{width:100%; padding:15px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--text); border:none; font-weight:600; font-size:14px; margin-top:10px; font-family:var(--font-body); letter-spacing:.04em; text-transform:uppercase;}
.btn-row{display:flex; gap:10px; margin-top:6px;}
.btn-row .btn-primary, .btn-row .btn-secondary{margin-top:0;}

/* toast */
.toast{position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:12px 20px; border-radius:30px; font-size:13px; font-weight:600; z-index:100; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:8px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

/* misc */
.pill-tab-row{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; gap:4px; margin-bottom:16px;}
.pill-tab{flex:1; text-align:center; padding:9px 0; border-radius:11px; border:none; background:none; font-weight:700; font-size:13px; color:var(--text-muted);}
.pill-tab.active{background:var(--surface); color:var(--primary); box-shadow:var(--shadow);}
.credit-card{background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:12px; box-shadow:var(--shadow); border:1px solid var(--border);}
.credit-card .cname{font-weight:700; font-family:var(--font-display); font-size:15px;}
.credit-card .cphone{font-size:12px; color:var(--text-muted);}
.progress-bar{height:6px; background:var(--surface-2); border-radius:4px; margin:10px 0 6px; overflow:hidden;}
.progress-fill{height:100%; background:var(--gold);}
.filter-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px;}
.filter-chip{padding:8px 14px; border-radius:18px; background:var(--surface-2); border:none; font-size:12px; font-weight:700; color:var(--text-muted); white-space:nowrap; flex-shrink:0;}
.filter-chip.active{background:var(--primary); color:#fff;}
.search-box{display:flex; align-items:center; gap:8px; background:var(--surface-2); border-radius:var(--radius-sm); padding:11px 14px; margin-bottom:14px;}
.search-box input{background:none; border:none; outline:none; flex:1; font-size:14px; color:var(--text);}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
.stat-box{background:var(--surface); border-radius:var(--radius); padding:14px; border:1px solid var(--border);}
.stat-box .lbl{font-size:11px; color:var(--text-muted); font-weight:600;}
.stat-box .v{font-family:var(--font-display); font-size:18px; font-weight:700; margin-top:4px;}
.range-row{display:flex; gap:8px; margin-bottom:16px;}
.range-btn{flex:1; padding:10px 0; border-radius:12px; background:var(--surface-2); border:none; font-weight:700; font-size:12px; color:var(--text-muted);}
.range-btn.active{background:var(--primary); color:#fff;}
.chart-card{background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:16px; border:1px solid var(--border);}
.chart-card h4{margin:0 0 12px; font-family:var(--font-display); font-size:14px;}
.profile-row{display:flex; align-items:center; gap:14px; padding:14px; background:var(--surface); border-radius:var(--radius); margin-bottom:10px; border:1px solid var(--border);}
.avatar{width:56px; height:56px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:22px;}
.settings-item{display:flex; justify-content:space-between; align-items:center; padding:14px 4px; border-bottom:1px solid var(--border);}
.settings-item:last-child{border-bottom:none;}
.settings-label{font-size:14px; font-weight:600; display:flex; align-items:center; gap:10px;}
.switch{width:44px; height:26px; border-radius:14px; background:var(--surface-2); position:relative; border:none;}
.switch.on{background:var(--primary);}
.switch::after{content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .15s;}
.switch.on::after{left:21px;}
.lang-toggle{display:flex; background:rgba(255,255,255,.18); border-radius:20px; padding:3px;}
.lang-btn{padding:6px 12px; border-radius:16px; border:none; background:none; font-size:12px; font-weight:700; color:rgba(255,255,255,.85);}
.lang-btn.active{background:rgba(255,255,255,.3); color:#fff;}
.lang-toggle-alt{display:flex; background:var(--surface-2); border-radius:20px; padding:3px;}
.lang-btn-alt{padding:6px 12px; border-radius:16px; border:none; background:none; font-size:12px; font-weight:700; color:var(--text-muted);}
.lang-btn-alt.active{background:var(--primary); color:#fff;}
.insight-card{background:linear-gradient(135deg,var(--primary-light),var(--surface)); border-radius:var(--radius); padding:14px; margin-bottom:10px; border:1px solid var(--border); font-size:13px; display:flex; gap:10px;}
.chip.add-chip{border-style:dashed; color:var(--primary); border-color:var(--primary);}
.photo-preview{position:relative; width:88px; height:88px; border-radius:14px; overflow:hidden; border:1.5px solid var(--border); margin-top:8px;}
.photo-preview img{width:100%; height:100%; object-fit:cover;}
.photo-remove{position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; border:none; font-size:12px; display:flex; align-items:center; justify-content:center;}
.reminder-banner{display:flex; align-items:center; gap:10px; background:var(--gold-light); border:1px solid var(--gold); border-radius:var(--radius-sm); padding:12px 14px; margin:0 18px 14px; font-size:12px;}
.reminder-banner button{background:none; border:none; color:var(--primary); font-weight:800; font-size:12px; flex-shrink:0;}
.action-row-sm{display:flex; gap:8px; margin-top:12px;}
.action-btn-sm{flex:1; padding:10px; border-radius:12px; background:var(--surface-2); border:none; font-weight:700; font-size:12px; color:var(--text); display:flex; align-items:center; justify-content:center; gap:6px;}
.payment-hist-item{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--border); font-size:13px;}
.payment-hist-item:last-child{border-bottom:none;}
.locked-card{opacity:.45; pointer-events:none; position:relative;}
.role-badge{font-size:10px; font-weight:800; padding:3px 8px; border-radius:8px; background:var(--primary-light); color:var(--primary); text-transform:uppercase;}
.cat-manage-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);}
.cat-del{background:none; border:none; color:var(--expense); font-size:16px;}
.notif-banner{position:fixed; top:14px; left:50%; transform:translateX(-50%); max-width:440px; width:92%; background:var(--surface); border-radius:14px; padding:12px 16px; box-shadow:var(--shadow-lg); z-index:110; display:flex; align-items:center; gap:10px; border:1px solid var(--border); font-size:13px;}
.check-overlay{position:fixed; inset:0; background:rgba(10,20,17,.55); z-index:120; display:none; align-items:center; justify-content:center;}
.check-overlay.show{display:flex;}
.check-box{background:var(--surface); border-radius:24px; padding:30px; text-align:center; width:260px; animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(.7); opacity:0;} 100%{transform:scale(1); opacity:1;}}
.check-circle{width:64px; height:64px; border-radius:50%; background:var(--income-light); color:var(--income); display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 14px; animation:pulse .5s ease;}
@keyframes pulse{0%{transform:scale(0);} 60%{transform:scale(1.15);} 100%{transform:scale(1);}}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 37%,var(--surface-2) 63%); background-size:400% 100%; animation:sk 1.4s ease infinite; border-radius:10px;}
@keyframes sk{0%{background-position:100% 50%;} 100%{background-position:0 50%;}}

/* LOCK SCREEN */
.lock-screen{position:fixed; inset:0; z-index:200; background:linear-gradient(160deg,#070F1F,#1F3350); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; max-width:480px; margin:0 auto;}
.lock-title{font-family:var(--font-display); font-size:18px; font-weight:700; margin-bottom:22px;}
.lock-dots{display:flex; gap:14px; margin-bottom:30px;}
.lock-dot{width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.6); transition:background .1s;}
.lock-dot.filled{background:#fff;}
.lock-keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; width:250px;}
.lock-key{padding:16px 0; border-radius:50%; background:rgba(255,255,255,.14); border:none; color:#fff; font-family:var(--font-display); font-size:20px; font-weight:700;}
.lock-key:active{background:rgba(255,255,255,.3);}
.lock-error{color:#FFD9D6; font-size:12px; margin-top:14px; min-height:16px;}

/* TUTORIAL WALKTHROUGH */
.tutorial-overlay{position:fixed; inset:0; z-index:300; background:rgba(10,25,49,.55); display:flex; align-items:flex-end; max-width:480px; margin:0 auto;}
.tutorial-card{position:relative; width:100%; background:var(--surface); border-radius:26px 26px 0 0; padding:32px 24px calc(28px + var(--safe-bottom)); text-align:center; animation:slideUp .25s ease;}
.tutorial-skip{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-faint); font-size:13px; font-weight:700; padding:6px 8px;}
.tutorial-icon{width:88px; height:88px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-size:44px;}
.tutorial-title{font-family:var(--font-display); font-weight:700; font-size:22px; color:var(--text); margin-bottom:10px;}
.tutorial-body{font-size:16px; line-height:1.5; color:var(--text-muted); margin-bottom:20px;}
.tutorial-dots{display:flex; justify-content:center; gap:8px; margin-bottom:20px;}
.tut-dot{width:8px; height:8px; border-radius:50%; background:var(--border);}
.tut-dot.active{background:var(--primary); width:22px; border-radius:5px; transition:all .2s;}
.lock-sub{font-size:12px; opacity:.8; margin-top:-14px; margin-bottom:20px;}

/* BUDGETS */
.budget-row{padding:12px 0; border-bottom:1px solid var(--border);}
.budget-row:last-child{border-bottom:none;}
.budget-row-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; font-weight:600;}
.budget-input{width:90px; padding:6px 8px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; text-align:right;}
.budget-progress{height:8px; border-radius:5px; background:var(--surface-2); overflow:hidden;}
.budget-progress-fill{height:100%; border-radius:5px;}
.budget-warn{font-size:11px; margin-top:4px;}

/* RECURRING */
.recurring-card{display:flex; align-items:center; gap:12px; background:var(--surface); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:10px; border:1px solid var(--border);}
.recurring-ico{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
.recurring-mid{flex:1; min-width:0;}
.recurring-title{font-weight:700; font-size:13px;}
.recurring-sub{font-size:11px; color:var(--text-muted);}
.recurring-add{padding:8px 14px; border-radius:10px; background:var(--primary); color:#fff; border:none; font-weight:700; font-size:12px; flex-shrink:0;}
.recur-manage-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;}

/* AUTH SCREENS */
.auth-screen{position:fixed; inset:0; z-index:150; background:var(--bg); overflow-y:auto; max-width:480px; margin:0 auto;}
.auth-hero{
  background:
    radial-gradient(circle at 85% -10%, rgba(199,210,220,.18), transparent 55%),
    linear-gradient(160deg, #070F1F 0%, #1F3350 100%);
  color:#fff; padding:56px 24px 46px; text-align:center; position:relative; overflow:hidden;
}
.auth-hero::before{content:"";position:absolute; inset:14px; border:1px solid rgba(199,210,220,.22); border-radius:22px; pointer-events:none;}
.auth-hero::after{content:"";position:absolute; right:-50px; top:-50px; width:180px; height:180px; border-radius:50%; background:rgba(199,210,220,.10);}
.auth-logo{
  width:64px; height:64px; border-radius:50%; margin:0 auto 16px; position:relative; z-index:1;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-weight:600; font-size:24px; letter-spacing:.02em; color:var(--gold);
  background:rgba(255,255,255,.06); border:1.5px solid rgba(199,210,220,.45);
  box-shadow:0 0 0 5px rgba(199,210,220,.10);
}
.auth-title{font-family:'Fraunces',serif; font-weight:600; font-size:24px; position:relative; z-index:1; letter-spacing:.01em;}
.auth-sub{font-family:'Inter',sans-serif; font-size:11px; opacity:.75; margin-top:6px; position:relative; z-index:1; text-transform:uppercase; letter-spacing:.16em; font-weight:600;}
.auth-card{background:var(--surface); border-radius:26px 26px 0 0; margin-top:-26px; position:relative; padding:30px 24px 54px; min-height:56vh; box-shadow:0 -12px 30px -18px rgba(0,0,0,.12);}
.auth-tabs{display:grid; grid-template-columns:1fr 1fr; gap:6px; background:var(--surface-2); border-radius:14px; padding:5px; margin-bottom:22px;}
.auth-tab{flex:none; text-align:center; padding:12px 4px; border-radius:10px; border:none; background:none; font-family:'Inter',sans-serif; font-weight:700; font-size:14px; letter-spacing:.01em; color:var(--text-muted); position:relative; box-shadow:none; display:flex; align-items:center; justify-content:center; gap:6px;}
.auth-tab::after{display:none;}
.auth-tab.active{color:var(--text); background:var(--surface); box-shadow:var(--shadow);}
.auth-hint{font-size:12px; color:var(--text-muted); margin:-10px 0 16px; line-height:1.4;}
.auth-divider{display:flex; align-items:center; gap:10px; margin:20px 0; color:var(--text-faint); font-size:11px; text-transform:uppercase; letter-spacing:.12em; font-weight:600;}
.auth-divider::before, .auth-divider::after{content:""; flex:1; height:1px; background:var(--border);}
.google-btn{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--surface); border:1.5px solid var(--border); font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; gap:10px; color:var(--text); transition:border-color .2s ease, box-shadow .2s ease;}
.google-btn:hover{border-color:var(--gold); box-shadow:var(--shadow);}
.google-g{width:20px; height:20px; border-radius:50%; background:#fff; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; color:#4285F4;}
.auth-link{text-align:center; font-size:13px; color:var(--text-muted); margin-top:18px;}
.auth-link .link-inline{color:var(--gold); font-weight:700; background:none; border:none; font-size:13px;}
.remember-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); margin:2px 0 18px;}
.remember-row input{width:16px; height:16px; accent-color:var(--gold);}
.demo-otp-banner{background:var(--gold-light); border:1px solid var(--gold); border-radius:12px; padding:10px 14px; font-size:12px; text-align:center; margin-bottom:16px;}
.auth-error{color:#fff; background:var(--expense); font-size:13px; text-align:center; margin:-4px 0 16px; font-weight:600; padding:10px 12px; border-radius:10px;}
.back-link{background:none; border:none; color:var(--text-muted); font-size:13px; display:flex; align-items:center; gap:6px; margin-bottom:16px; padding:0;}
.demo-note{font-size:11px; color:var(--text-faint); text-align:center; margin-top:6px;}
.auth-card .field{margin-bottom:18px;}
.auth-card .field label{font-size:13px; text-transform:none; letter-spacing:0; font-weight:700; color:var(--text);}
.auth-card .field input{padding:15px 16px; font-size:16px; border-radius:14px;}
.auth-card .field input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(199,154,61,.16);}
.auth-card .btn-primary{background:linear-gradient(135deg, #0A1931, #2B3F58); letter-spacing:.02em; padding:15px; font-size:16px;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:52px !important;}
.pw-toggle{position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:12px; font-weight:700; color:var(--text-muted); padding:8px 10px;}
</style>

function simpleHash(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = (hash<<5)-hash+str.charCodeAt(i); hash|=0; }
  return 'h'+Math.abs(hash).toString(36)+str.length;
}
function saveSession(userId, remember){

}
function loadSession(){

}

function gstBreakup(amount){
  // amount is treated as GST-inclusive; splits it into taxable value + GST amount using the configured rate
  const rate = Number(STATE.settings.gstRate)||0;
  amount = Number(amount)||0;
  if(rate<=0) return { rate:0, taxable:amount, gst:0 };
  const taxable = amount / (1 + rate/100);
  const gst = amount - taxable;
  return { rate, taxable, gst };
}

function todaysTx(){ const d = todayStr(); return STATE.transactions.filter(x=>x.date===d); }
function sumBy(arr, type){ return arr.filter(x=>x.type===type).reduce((s,x)=>s+Number(x.amount),0); }
function totalCashInHand(){
  const inSum = sumBy(STATE.transactions,'in');
  const outSum = sumBy(STATE.transactions,'out');
  // Credit given hands cash/value to someone else, so it reduces cash in hand until they repay.
  const credGivenOut = STATE.credits.filter(c=>c.type==='given').reduce((s,c)=>s+Number(c.amount),0);
  // Repayments against credit given bring that cash back in.
  const credRecSum = STATE.payments.filter(p=>{
    const c = STATE.credits.find(cr=>cr.id===p.creditId);
    return c && c.type==='given';
  }).reduce((s,p)=>s+Number(p.amount),0);
  // Credit received is already logged as an 'in' transaction above, so no separate adjustment needed for it.
  return inSum - outSum - credGivenOut + credRecSum;
}
function pendingCreditTotal(){
  return STATE.credits.filter(c=>c.type==='given').reduce((s,c)=>{
    const paidSum = STATE.payments.filter(p=>p.creditId===c.id).reduce((a,p)=>a+Number(p.amount),0);
    const rem = Number(c.amount) - paidSum;
    return s + Math.max(rem,0);
  },0);
}
function creditPaidAmount(creditId){
  return STATE.payments.filter(p=>p.creditId===creditId).reduce((s,p)=>s+Number(p.amount),0);
}

/* ---------- PIN lock screen ---------- */
let LOCK_INPUT = '';
let LOCK_ERROR = '';
let LOCK_MODE = 'unlock'; // 'unlock' | 'create' | 'confirm' | 'disable'
let LOCK_PENDING_PIN = '';
function renderLockScreen(){
  const titleMap = { unlock:t('enterPin'), create:t('createPin'), confirm:t('confirmPin'), disable:t('disablePin') };
  const dots = [0,1,2,3].map(i=>`<div class="lock-dot ${i<LOCK_INPUT.length?'filled':''}"></div>`).join('');
  return `<div class="lock-screen">
    <div class="lock-title">🔒 ${titleMap[LOCK_MODE]}</div>
    <div class="lock-dots">${dots}</div>
    <div class="lock-keypad">
      ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=> k? `<button class="lock-key" data-lockkey="${k}" ${k===''?'style="visibility:hidden"':''}>${k}</button>` : `<div></div>`).join('')}
    </div>
    <div class="lock-error">${LOCK_ERROR}</div>
  </div>`;
}
function attachLockHandlers(){
  document.querySelectorAll('[data-lockkey]').forEach(el=> el.addEventListener('click', ()=>{
    const k = el.getAttribute('data-lockkey');
    if(k==='⌫'){ LOCK_INPUT = LOCK_INPUT.slice(0,-1); LOCK_ERROR=''; render(); return; }
    if(LOCK_INPUT.length>=4) return;
    LOCK_INPUT += k;
    if(LOCK_INPUT.length===4){ handleLockSubmit(); }
    else render();
  }));
}
function handleLockSubmit(){
  if(LOCK_MODE==='unlock'){
    if(LOCK_INPUT===STATE.settings.pin){ APP_UNLOCKED = true; LOCK_INPUT=''; LOCK_ERROR=''; render(); }
    else { LOCK_ERROR = t('wrongPin'); LOCK_INPUT=''; render(); }
  } else if(LOCK_MODE==='create'){
    LOCK_PENDING_PIN = LOCK_INPUT; LOCK_INPUT=''; LOCK_MODE='confirm'; LOCK_ERROR=''; render();
  } else if(LOCK_MODE==='confirm'){
    if(LOCK_INPUT===LOCK_PENDING_PIN){
      STATE.settings.pin = LOCK_INPUT; STATE.settings.pinEnabled = true; APP_UNLOCKED = true;
      persist(); LOCK_INPUT=''; LOCK_MODE='unlock'; LOCK_PENDING_PIN=''; LOCK_ERROR='';
      showToast(t('pinSet')); render();
    } else { LOCK_ERROR = t('pinMismatch'); LOCK_INPUT=''; LOCK_MODE='create'; render(); }
  } else if(LOCK_MODE==='disable'){
    if(LOCK_INPUT===STATE.settings.pin){
      STATE.settings.pin = null; STATE.settings.pinEnabled = false; APP_UNLOCKED = true;
      persist(); LOCK_INPUT=''; LOCK_MODE='unlock'; LOCK_ERROR='';
      showToast(t('pinRemoved')); render();
    } else { LOCK_ERROR = t('wrongPin'); LOCK_INPUT=''; render(); }
  }
}
function startCreatePin(){ LOCK_MODE='create'; LOCK_INPUT=''; LOCK_ERROR=''; LOCK_PENDING_PIN=''; APP_UNLOCKED=false; render(); }
function startDisablePin(){ LOCK_MODE='disable'; LOCK_INPUT=''; LOCK_ERROR=''; APP_UNLOCKED=false; render(); }

function attachAuthHandlers(){
  const root = document.getElementById('root');
  root.querySelectorAll('[data-authtab]').forEach(el=> el.addEventListener('click', ()=>{ AUTH_FORM.tab = el.getAttribute('data-authtab'); AUTH_FORM.error=''; render(); }));
  root.querySelectorAll('[data-pw-toggle]').forEach(btn=> btn.addEventListener('click', ()=>{
    const input = document.getElementById(btn.getAttribute('data-pw-toggle'));
    if(!input) return;
    const showing = input.type==='text';
    input.type = showing ? 'password' : 'text';
    btn.textContent = showing ? t('showPw') : t('hidePw');
  }));

  const sendOtpBtn = document.getElementById('sendOtpBtn');
  if(sendOtpBtn) sendOtpBtn.addEventListener('click', handleSendOtp);
  const emailLoginBtn = document.getElementById('emailLoginBtn');
  if(emailLoginBtn) emailLoginBtn.addEventListener('click', handleEmailLogin);
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  if(googleLoginBtn) googleLoginBtn.addEventListener('click', handleGoogleLogin);
  const forgotPassBtn = document.getElementById('forgotPassBtn');
  if(forgotPassBtn) forgotPassBtn.addEventListener('click', ()=>{ AUTH_SCREEN='forgotEmail'; AUTH_FORM.error=''; render(); });
  const goSignupBtn = document.getElementById('goSignupBtn');
  if(goSignupBtn) goSignupBtn.addEventListener('click', ()=>{ AUTH_SCREEN='signup'; AUTH_FORM.error=''; render(); });
  const goLoginBtn = document.getElementById('goLoginBtn');
  if(goLoginBtn) goLoginBtn.addEventListener('click', ()=>{ AUTH_SCREEN='login'; AUTH_FORM.error=''; render(); });
  const authBack = document.getElementById('authBack');
  if(authBack) authBack.addEventListener('click', ()=>{ AUTH_SCREEN='login'; AUTH_FORM.error=''; render(); });
  const createAccountBtn = document.getElementById('createAccountBtn');
  if(createAccountBtn) createAccountBtn.addEventListener('click', handleCreateAccount);
  const verifyOtpBtn = document.getElementById('verifyOtpBtn');
  if(verifyOtpBtn) verifyOtpBtn.addEventListener('click', handleVerifyOtp);
  const resendOtpBtn = document.getElementById('resendOtpBtn');
  if(resendOtpBtn) resendOtpBtn.addEventListener('click', handleResendOtp);
  const sendResetBtn = document.getElementById('sendResetBtn');
  if(sendResetBtn) sendResetBtn.addEventListener('click', handleSendResetCode);
  const resetPasswordBtn = document.getElementById('resetPasswordBtn');
  if(resetPasswordBtn) resetPasswordBtn.addEventListener('click', handleResetPassword);

  const bind = (id, key)=>{ const el = document.getElementById(id); if(el) el.addEventListener('input', e=> AUTH_FORM[key]=e.target.value); };
  bind('authEmail','email'); bind('authPassword','password');
  bind('signupName','name'); bind('signupPhone','phone'); bind('signupEmail','email'); bind('signupPassword','password');
  bind('forgotEmailInput','email');
  const rememberChk = document.getElementById('rememberChk');
  if(rememberChk) rememberChk.addEventListener('change', e=> AUTH_FORM.remember = e.target.checked);
  const signupRole = document.getElementById('signupRole');
  if(signupRole) signupRole.addEventListener('change', e=> AUTH_FORM.role = e.target.value);

  // Fewer taps: auto-send once a full phone number is typed, no need to tap "Send OTP"
  const authPhoneEl = document.getElementById('authPhone');
  if(authPhoneEl) authPhoneEl.addEventListener('input', e=>{
    AUTH_FORM.phone = e.target.value;
    if(e.target.value.replace(/\D/g,'').length===10) handleSendOtp();
  });
  // Fewer taps: auto-verify once all 4 OTP digits are typed, no need to tap "Verify"
  const otpInputEl = document.getElementById('otpInput');
  if(otpInputEl) otpInputEl.addEventListener('input', e=>{
    AUTH_FORM.otp = e.target.value;
    if(e.target.value.replace(/\D/g,'').length===4) handleVerifyOtp();
  });
  // Reset-password code: once 4 digits are in, jump straight to the new-password field
  const resetCodeEl = document.getElementById('resetCodeInput');
  if(resetCodeEl) resetCodeEl.addEventListener('input', e=>{
    AUTH_FORM.otp = e.target.value;
    if(e.target.value.replace(/\D/g,'').length===4){
      const pwEl = document.getElementById('newPasswordInput');
      if(pwEl) pwEl.focus();
    }
  });

  // Enter key submits the current form, so people don't have to reach for a button
  const onEnter = (id, fn)=>{ const el = document.getElementById(id); if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); fn(); } }); };
  onEnter('authPassword', handleEmailLogin);
  onEnter('signupPassword', handleCreateAccount);
  onEnter('forgotEmailInput', handleSendResetCode);
  onEnter('newPasswordInput', handleResetPassword);

  // Auto-focus the first field of whichever auth screen is showing, so typing can start immediately
  let focusId = null;
  if(AUTH_SCREEN==='login') focusId = AUTH_FORM.tab==='phone' ? 'authPhone' : 'authEmail';
  else if(AUTH_SCREEN==='signup') focusId = 'signupName';
  else if(AUTH_SCREEN==='otp') focusId = 'otpInput';
  else if(AUTH_SCREEN==='forgotEmail') focusId = 'forgotEmailInput';
  else if(AUTH_SCREEN==='forgotReset') focusId = 'resetCodeInput';
  if(focusId){ const el = document.getElementById(focusId); if(el) el.focus(); }
}

function genOtp(){ return String(Math.floor(1000+Math.random()*9000)); }

function handleSendOtp(){
  const phone = (document.getElementById('authPhone').value||'').trim();
  if(phone.replace(/\D/g,'').length<10){ AUTH_FORM.error = t('invalidPhone'); render(); return; }
  AUTH_FORM.phone = phone;
  AUTH_FORM.remember = !!document.getElementById('rememberChk').checked;
  AUTH_FORM.sentOtp = genOtp();
  AUTH_FORM.otp = '';
  AUTH_FORM.error = '';
  AUTH_SCREEN = 'otp';
  render();
}
function handleResendOtp(){ AUTH_FORM.sentOtp = genOtp(); AUTH_FORM.otp=''; showToast(t('otpSent')); render(); }
function handleVerifyOtp(){
  const entered = (document.getElementById('otpInput').value||'').trim();
  if(entered !== AUTH_FORM.sentOtp){ AUTH_FORM.error = t('wrongOtp'); render(); return; }
  let user = STATE.users.find(u=>u.phone===AUTH_FORM.phone);
  if(!user){
    user = { id: uid(), name: AUTH_FORM.phone, phone: AUTH_FORM.phone, email:'', passHash:null, role: STATE.users.length===0?'owner':'staff', createdAt: Date.now() };
    STATE.users.push(user);
    DB.write('users', STATE.users);
  }
  completeLogin(user, AUTH_FORM.remember);
}

function handleEmailLogin(){
  const email = (document.getElementById('authEmail').value||'').trim().toLowerCase();
  const password = document.getElementById('authPassword').value||'';
  const remember = !!document.getElementById('rememberChk').checked;
  const user = STATE.users.find(u=>u.email && u.email.toLowerCase()===email);
  if(!user || user.passHash !== simpleHash(password)){
    AUTH_FORM.error = t('wrongCreds');
    render(); return;
  }
  completeLogin(user, remember);
}

function handleGoogleLogin(){
  // No real OAuth backend is connected in this build; this simulates a Google-style account locally
  // so the flow is fully explorable. Connect a real Firebase project for actual Google Sign-In.
  let user = STATE.users.find(u=>u.provider==='google');
  if(!user){
    user = { id: uid(), name:'Google User', phone:'', email:'demo.google.user@gmail.com', passHash:null, role: STATE.users.length===0?'owner':'staff', provider:'google', createdAt: Date.now() };
    STATE.users.push(user);
    DB.write('users', STATE.users);
  }
  showToast(t('googleDemoNote'));
  completeLogin(user, true);
}

function handleCreateAccount(){
  const name = (document.getElementById('signupName').value||'').trim();
  const usingPhone = AUTH_FORM.tab !== 'email';
  const phone = usingPhone ? (document.getElementById('signupPhone').value||'').trim() : '';
  const email = usingPhone ? '' : (document.getElementById('signupEmail').value||'').trim().toLowerCase();
  const password = document.getElementById('signupPassword').value||'';
  const firstUser = STATE.users.length===0;
  const roleSelect = document.getElementById('signupRole');
  const role = firstUser ? 'owner' : (roleSelect ? roleSelect.value : 'staff');
  if(!name){ AUTH_FORM.error = t('nameRequired'); render(); return; }
  if(usingPhone){
    if(phone.replace(/\D/g,'').length<10){ AUTH_FORM.error = t('invalidPhone'); render(); return; }
  } else {
    if(!email){ AUTH_FORM.error = t('phoneOrEmailReq'); render(); return; }
  }
  if(password.length<4){ AUTH_FORM.error = t('passwordShort'); render(); return; }
  if(phone && STATE.users.some(u=>u.phone===phone)){ AUTH_FORM.error = t('phoneTaken'); render(); return; }
  if(email && STATE.users.some(u=>u.email && u.email.toLowerCase()===email)){ AUTH_FORM.error = t('emailTaken'); render(); return; }
  const user = { id: uid(), name, phone, email, passHash: simpleHash(password), role, createdAt: Date.now() };
  STATE.users.push(user);
  DB.write('users', STATE.users);
  completeLogin(user, true);
}

function completeLogin(user, remember){
  CURRENT_USER_ID = user.id;
  STATE.settings.role = user.role;
  persist();
  saveSession(user.id, remember);
  AUTH_FORM = { tab:'phone', phone:'', email:'', password:'', name:'', remember:true, otp:'', sentOtp:'', role:'staff', error:'' };
  AUTH_SCREEN = 'login';
  showCheck(t('welcomeUser')+', '+(user.name||user.phone||user.email)+'!');
  render();
}

function handleSendResetCode(){
  const email = (document.getElementById('forgotEmailInput').value||'').trim().toLowerCase();
  const user = STATE.users.find(u=>u.email && u.email.toLowerCase()===email);
  if(!user){ AUTH_FORM.error = t('noAccountEmail'); render(); return; }
  AUTH_FORM.email = email;
  AUTH_FORM.sentOtp = genOtp();
  AUTH_FORM.otp = '';
  AUTH_FORM.error = '';
  AUTH_SCREEN = 'forgotReset';
  render();
}

function handleResetPassword(){
  const code = (document.getElementById('resetCodeInput').value||'').trim();
  const newPass = document.getElementById('newPasswordInput').value||'';
  if(code !== AUTH_FORM.sentOtp){ AUTH_FORM.error = t('wrongCode'); render(); return; }
  if(newPass.length<4){ AUTH_FORM.error = t('passwordShort'); render(); return; }
  const user = STATE.users.find(u=>u.email && u.email.toLowerCase()===AUTH_FORM.email);
  if(user){ user.passHash = simpleHash(newPass); DB.write('users', STATE.users); }
  AUTH_SCREEN = 'login';
  AUTH_FORM.tab = 'email';
  AUTH_FORM.error = '';
  showToast(t('passwordUpdated'));
  render();
}

function handleLogout(){
  clearSession();
  CURRENT_USER_ID = null;
  APP_UNLOCKED = !STATE.settings.pinEnabled;
  AUTH_SCREEN = STATE.users.length===0 ? 'signup' : 'login';
  ROUTE = 'home';
  OPEN_SCREEN = null;
  render();
}

function renderSummary(){
  const tx = todaysTx();
  const inc = sumBy(tx,'in'), exp = sumBy(tx,'out');
  const profit = inc-exp;
  const cash = totalCashInHand();
  const pending = pendingCreditTotal();
  const gstRate = Number(STATE.settings.gstRate)||0;
  const gstToday = tx.filter(x=>x.type==='in').reduce((s,x)=> s + gstBreakup(x.amount).gst, 0);
  const cards = [
    {label:t('income'), val:fmtMoney(inc), dot:'var(--income)'},
    {label:t('expense'), val:fmtMoney(exp), dot:'var(--expense)'},
    {label:t('cash'), val:fmtMoney(cash), dot:'var(--primary)'},
    {label:t('profit'), val:fmtMoney(profit), dot: profit>=0 ? 'var(--income)' : 'var(--expense)'},
    {label:t('pending'), val:fmtMoney(pending), dot:'var(--gold)'},
  ];
  if(gstRate>0){
    cards.push({label:t('gstCollected'), val:fmtMoney(gstToday), dot:'var(--primary)'});
  }
  return `<div class="summary-scroll hide-scroll">
    ${cards.map(c=>`<div class="summary-card">
      <div class="label"><span class="dot" style="background:${c.dot}"></span>${c.label}</div>
      <div class="val">${c.val}</div>
    </div>`).join('')}
  </div>`;
}

function overdueCredits(){
  const cutoff = Date.now() - 7*86400000;
  return STATE.credits.filter(c=>{
    if(c.type!=='given') return false;
    if(c.ts > cutoff) return false;
    const rem = Number(c.amount) - creditPaidAmount(c.id);
    return rem > 0;
  });

function renderInsights(){
  const insights = computeInsights();
  if(!insights.length) return '';
  return `<div class="section"><div class="section-title">✨ ${t('insights')}</div>
    ${insights.map(i=>`<div class="insight-card"><span>${i.icon}</span><span>${i.text}</span></div>`).join('')}
  </div>`;
}
function computeInsights(){
  const out = [];
  const today = todayStr();
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const expToday = sumBy(STATE.transactions.filter(x=>x.date===today),'out');
  const expYest = sumBy(STATE.transactions.filter(x=>x.date===yest),'out');
  if(expYest>0){
    const pct = Math.round(((expToday-expYest)/expYest)*100);
    if(Math.abs(pct)>=10) out.push({icon: pct>0?'📈':'📉', text:(LANG==='ta'? `இன்றைய செலவு ${Math.abs(pct)}% ${pct>0?'அதிகரித்தது':'குறைந்தது'}.` : `Today's expenses ${pct>0?'increased':'decreased'} by ${Math.abs(pct)}% vs yesterday.`)});
  }
  const pending = pendingCreditTotal();
  if(pending>0) out.push({icon:'🟡', text: LANG==='ta'? `உங்களுக்கு ${fmtMoney(pending)} நிலுவை கடன் உள்ளது.` : `You have ${fmtMoney(pending)} pending credit to collect.`});
  const last7 = STATE.transactions.filter(x=> (Date.now()-x.ts) < 7*86400000 );
  const byCat = {};
  last7.filter(x=>x.type==='in').forEach(x=>{ byCat[x.category]=(byCat[x.category]||0)+Number(x.amount); });
  const top = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  if(top) out.push({icon:'⭐', text: LANG==='ta'? `இந்த வாரம் அதிக வருமானம்: ${top[0]}.` : `${top[0]} is your top income category this week.`});
  const daysWithTx = [...new Set(STATE.transactions.map(x=>x.date))];
  if(daysWithTx.length>=3){
    const avgProfit = daysWithTx.map(d=>{
      const tx = STATE.transactions.filter(x=>x.date===d);
      return sumBy(tx,'in')-sumBy(tx,'out');
    }).reduce((a,b)=>a+b,0)/daysWithTx.length;
    out.push({icon:'💡', text: LANG==='ta'? `சராசரி தினசரி லாபம்: ${fmtMoney(Math.round(avgProfit))}.` : `Your average daily profit is ${fmtMoney(Math.round(avgProfit))}.`});
  }
  return out.slice(0,3);
}

function rangeDays(range){
  if(range==='day') return 1;
  if(range==='week') return 7;
  if(range==='month') return 30;
  return 365;
}
function rangeTx(){
  const days = rangeDays(REPORT_RANGE);
  const cutoff = Date.now() - days*86400000;

function renderReportStats(){

let CHART_RETRY_COUNT = 0;
function drawCharts(){
  if(!window.Chart){
    if(CHART_RETRY_COUNT < 10){ CHART_RETRY_COUNT++; setTimeout(drawCharts, 250); return; }
    const msg = `<div style="text-align:center; color:var(--text-muted); font-size:12px; padding:20px 0;">📉 ${t('chartsUnavailable')}</div>`;
    const c1card = document.getElementById('chartTrendCard');
    const c2card = document.getElementById('chartCatCard');
    if(c1card) c1card.innerHTML = `<h4>${t('incomeVsExpense')}</h4>${msg}`;
    if(c2card) c2card.innerHTML = `<h4>${t('byCategory')}</h4>${msg}`;
    return;
  }
  CHART_RETRY_COUNT = 0;
  const tx = rangeTx();
  const days = rangeDays(REPORT_RANGE);
  const buckets = Math.min(days, 12);
  const step = Math.max(1, Math.floor(days/buckets));
  const labels = [], incData=[], expData=[];
  for(let i=buckets-1;i>=0;i--){
    const end = Date.now() - i*step*86400000;
    const start = end - step*86400000;
    const bucketTx = tx.filter(x=>x.ts>=start && x.ts<end);
    labels.push(new Date(end).toLocaleDateString(LANG==='ta'?'ta-IN':'en-IN',{day:'numeric',month:'short'}));
    incData.push(sumBy(bucketTx,'in'));
    expData.push(sumBy(bucketTx,'out'));
  }
  const c1 = document.getElementById('chartTrend');
  if(c1){
    if(c1._chart) c1._chart.destroy();
    c1._chart = new Chart(c1, {type:'line', data:{labels, datasets:[
      {label:t('income'), data:incData, borderColor:'#3F9142', backgroundColor:'rgba(63,145,66,.15)', fill:true, tension:.3},
      {label:t('expense'), data:expData, borderColor:'#DC4C4C', backgroundColor:'rgba(220,76,76,.15)', fill:true, tension:.3},
    ]}, options:{plugins:{legend:{labels:{color:getCssVar('--text')}}}, scales:{x:{ticks:{color:getCssVar('--text-muted')}, grid:{display:false}}, y:{ticks:{color:getCssVar('--text-muted')}, grid:{color:getCssVar('--border')}}}}});
  }
  const c2 = document.getElementById('chartCat');
  if(c2){
    const byCat = {};
    tx.filter(x=>x.type==='out').forEach(x=>{ byCat[x.category]=(byCat[x.category]||0)+Number(x.amount); });
    const catLabels = Object.keys(byCat);
    const catData = Object.values(byCat);
    if(c2._chart) c2._chart.destroy();
    if(catLabels.length){
      c2._chart = new Chart(c2, {type:'doughnut', data:{labels:catLabels, datasets:[{data:catData, backgroundColor:['#0A1931','#5B6B7D','#8C97A6','#C7D2DC','#1F3350','#3A4A5C','#9AA5B1','#070F1F']}]}, options:{plugins:{legend:{position:'bottom', labels:{color:getCssVar('--text'), boxWidth:10, font:{size:10}}}}}});
    }
  }
}

function currentPeriodKey(freq){
  const d = new Date();
  if(freq==='weekly'){
    const onejan = new Date(d.getFullYear(),0,1);
    const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay()+1)/7);
    return d.getFullYear()+'-W'+week;
  }
  return d.toISOString().slice(0,7); // YYYY-MM for monthly
}
function dueRecurring(){
  return STATE.recurring.filter(r=> r.lastAddedPeriod !== currentPeriodKey(r.frequency));

/* ---------- Helpers ---------- */
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---------- Event delegation ---------- */
function attachHandlers(){
  const root = document.getElementById('root');

  const tutSkipBtn = document.getElementById('tutSkipBtn');
  if(tutSkipBtn) tutSkipBtn.addEventListener('click', ()=>{ STATE.settings.tutorialSeen = true; TUTORIAL_STEP = 0; persist(); render(); });
  const tutNextBtn = document.getElementById('tutNextBtn');
  if(tutNextBtn) tutNextBtn.addEventListener('click', ()=>{
    if(TUTORIAL_STEP < TUTORIAL_STEPS.length-1){ TUTORIAL_STEP++; render(); }
    else { STATE.settings.tutorialSeen = true; TUTORIAL_STEP = 0; persist(); render(); }
  });

  root.querySelectorAll('[data-nav]').forEach(el=> el.addEventListener('click', ()=> navigate(el.getAttribute('data-nav'))));
  root.querySelectorAll('[data-open]').forEach(el=> el.addEventListener('click', ()=>{
    const name = el.getAttribute('data-open');
    resetForm();
    openScreen(name);
  }));
  root.querySelectorAll('[data-lang-switch]').forEach(el=> el.addEventListener('click', ()=>{
    LANG = el.getAttribute('data-lang-switch');
    localStorage.setItem('ll_lang', LANG);
    render();
  }));
  const themeBtn = document.getElementById('themeToggle');
  if(themeBtn) themeBtn.addEventListener('click', ()=>{ STATE.settings.dark=!STATE.settings.dark; persist(); render(); });

  root.querySelectorAll('[data-tx-detail]').forEach(el=> el.addEventListener('click', ()=> openScreen('txDetail', {id: el.getAttribute('data-tx-detail')})));
  attachCreditCardHandlers(root);

  // transactions screen
  const txSearch = document.getElementById('txSearch');
  if(txSearch) txSearch.addEventListener('input', (e)=>{ TX_FILTER.search = e.target.value; updateTxListView(); });
  root.querySelectorAll('[data-txfilter]').forEach(el=> el.addEventListener('click', ()=>{ TX_FILTER.type = el.getAttribute('data-txfilter'); render(); }));

  // credit tabs
  root.querySelectorAll('[data-credittab]').forEach(el=> el.addEventListener('click', ()=>{ CREDIT_TAB = el.getAttribute('data-credittab'); render(); }));
  const creditSearch = document.getElementById('creditSearch');
  if(creditSearch) creditSearch.addEventListener('input', e=>{ CREDIT_SEARCH = e.target.value; updateCreditListView(); });

  // reports
  root.querySelectorAll('[data-range]').forEach(el=> el.addEventListener('click', ()=>{ REPORT_RANGE = el.getAttribute('data-range'); render(); }));
  const exportBtn = document.getElementById('exportCsvBtn');
  if(exportBtn) exportBtn.addEventListener('click', exportCsv);
  if(ROUTE==='reports') setTimeout(drawCharts, 30);

  // profile
  const darkSwitch = document.getElementById('darkSwitch');
  if(darkSwitch) darkSwitch.addEventListener('click', ()=>{ STATE.settings.dark=!STATE.settings.dark; persist(); render(); });
  root.querySelectorAll('[data-theme-accent]').forEach(el=> el.addEventListener('click', ()=>{
    STATE.settings.themeAccent = el.getAttribute('data-theme-accent'); persist(); render();
  }));
  const replayTutorialBtn = document.getElementById('replayTutorialBtn');
  if(replayTutorialBtn) replayTutorialBtn.addEventListener('click', ()=>{
    STATE.settings.tutorialSeen = false; TUTORIAL_STEP = 0; navigate('home'); render();
  });
  const backupBtn = document.getElementById('backupBtn');
  if(backupBtn) backupBtn.addEventListener('click', doBackup);
  const restoreBtn = document.getElementById('restoreBtn');
  const restoreFile = document.getElementById('restoreFile');
  if(restoreBtn) restoreBtn.addEventListener('click', ()=> restoreFile.click());
  if(restoreFile) restoreFile.addEventListener('change', doRestore);
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click', handleLogout);
  const shareBtn = document.getElementById('shareClosingBtn');
  if(shareBtn) shareBtn.addEventListener('click', shareClosing);
  root.querySelectorAll('[data-edit-profile]').forEach(el=> el.addEventListener('click', ()=> openScreen('editProfile')));

  const manageCatBtn = document.getElementById('manageCatBtn');
  if(manageCatBtn) manageCatBtn.addEventListener('click', ()=>{ PROFILE_SHOW_CATS = !PROFILE_SHOW_CATS; render(); });
  const toggleAdvancedBtn = document.getElementById('toggleAdvancedBtn');
  if(toggleAdvancedBtn) toggleAdvancedBtn.addEventListener('click', ()=>{ PROFILE_SHOW_ADVANCED = !PROFILE_SHOW_ADVANCED; render(); });
  root.querySelectorAll('[data-del-cat]').forEach(el=> el.addEventListener('click', ()=>{
    const [kind, name] = el.getAttribute('data-del-cat').split(':');
    const key = kind==='in' ? 'customCatsIn' : 'customCatsOut';
    STATE.settings[key] = STATE.settings[key].filter(c=>c!==name);
    persist(); render();
  }));
  const pdfReportBtn = document.getElementById('pdfReportBtn');
  if(pdfReportBtn) pdfReportBtn.addEventListener('click', exportDailyClosingPdf);
  const notifSwitch = document.getElementById('notifSwitch');
  if(notifSwitch) notifSwitch.addEventListener('click', toggleNotifications);
  const pinSwitch = document.getElementById('pinSwitch');
  if(pinSwitch) pinSwitch.addEventListener('click', ()=>{
    if(STATE.settings.pinEnabled) startDisablePin(); else startCreatePin();
  });

  const manageBudgetBtn = document.getElementById('manageBudgetBtn');
  if(manageBudgetBtn) manageBudgetBtn.addEventListener('click', ()=>{ PROFILE_SHOW_BUDGETS = !PROFILE_SHOW_BUDGETS; render(); });
  root.querySelectorAll('[data-budget-cat]').forEach(el=> el.addEventListener('change', (e)=>{
    const cat = el.getAttribute('data-budget-cat');
    const val = parseFloat(e.target.value);
    STATE.settings.budgets[cat] = isNaN(val) || val<=0 ? undefined : val;
    persist();
  }));

  const manageRecurringBtn = document.getElementById('manageRecurringBtn');
  if(manageRecurringBtn) manageRecurringBtn.addEventListener('click', ()=>{ PROFILE_SHOW_RECURRING = !PROFILE_SHOW_RECURRING; render(); });
  const addRecurringBtn = document.getElementById('addRecurringBtn');
  if(addRecurringBtn) addRecurringBtn.addEventListener('click', ()=>{ resetRecurForm(); openScreen('addRecurring'); });

      }
    }, ()=>{ voiceBtn.classList.remove('listening'); });
  });

  root.querySelectorAll('[data-key]').forEach(el=> el.addEventListener('click', ()=>{
    const k = el.getAttribute('data-key');
    if(k==='⌫'){ FORM.amount = FORM.amount.slice(0,-1); }
    else if(k==='.'){ if(!FORM.amount.includes('.')) FORM.amount += '.'; }
    else{ if(FORM.amount.length<9) FORM.amount += k; }
    const disp = document.getElementById('amtDisplay');
    if(disp) disp.textContent = FORM.amount || '0';

  root.querySelectorAll('[data-setcat]').forEach(el=> el.addEventListener('click', ()=>{ FORM.category = el.getAttribute('data-setcat'); render(); }));

  const addCatChip = document.getElementById('addCatChip');

    if(!val){ showToast(t('newCategory')); return; }

    if(!STATE.settings[key].includes(val)) STATE.settings[key].push(val);

    FORM.showAddCat = false;
    persist();
    render();

  const receiptFile = document.getElementById('receiptFile');
  if(receiptFile) receiptFile.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    reader.readAsDataURL(file);

  const removePhotoBtn = document.getElementById('removePhotoBtn');
  if(removePhotoBtn) removePhotoBtn.addEventListener('click', ()=>{ FORM.photo = null; render(); });

  const personInput = document.getElementById('personInput');
  if(personInput) personInput.addEventListener('input', e=> FORM.person = e.target.value);
  const phoneInput = document.getElementById('phoneInput');
  if(phoneInput) phoneInput.addEventListener('input', e=> FORM.phone = e.target.value);
  const notesInput = document.getElementById('notesInput');
  if(notesInput) notesInput.addEventListener('input', e=> FORM.notes = e.target.value);

  const receiptBtn = document.getElementById('receiptBtn');
  if(receiptBtn) receiptBtn.addEventListener('click', ()=>{ const rf = document.getElementById('receiptFile'); if(rf) rf.click(); });

  const editTxBtn = document.getElementById('editTxBtn');
  if(editTxBtn) editTxBtn.addEventListener('click', ()=> handleEditTxStart(editTxBtn.getAttribute('data-id')));

  const saveEntry = document.getElementById('saveEntry');
  if(saveEntry) saveEntry.addEventListener('click', ()=> handleSaveEntry(saveEntry.getAttribute('data-type'), false));

  if(saveAddAnother) saveAddAnother.addEventListener('click', ()=> handleSaveEntry(document.getElementById('saveEntry').getAttribute('data-type'), true));

  const savePaymentAddAnother = document.getElementById('savePaymentAddAnother');
  if(savePaymentAddAnother) savePaymentAddAnother.addEventListener('click', ()=> handleSavePayment(savePaymentAddAnother.getAttribute('data-id'), true));

  const deleteTxBtn = document.getElementById('deleteTxBtn');
  if(deleteTxBtn) deleteTxBtn.addEventListener('click', ()=> handleDeleteTx(deleteTxBtn.getAttribute('data-id')));

/* ---------- Handlers: business logic ---------- */
function validAmount(){ return parseFloat(FORM.amount) > 0; }

function handleSaveEntry(type, addAnother){
  if(!validAmount()){ showToast(LANG==='ta'?'சரியான தொகையை உள்ளிடவும்':'Please enter a valid amount'); return; }
  if(!FORM.category){ showToast(LANG==='ta'?'வகையைத் தேர்ந்தெடுக்கவும்':'Please select a category'); return; }
  const now = new Date();
  if(FORM.editId){
    const idx = STATE.transactions.findIndex(x=>x.id===FORM.editId);
    if(idx>=0){
      STATE.transactions[idx] = {
        ...STATE.transactions[idx],
        amount: parseFloat(FORM.amount), category: FORM.category, person: FORM.person, notes: FORM.notes, photo: FORM.photo
      };
      persist();
      showCheck(t('saved'));
      setTimeout(()=> navigate('transactions'), 250);
    }
    return;
  }
  const tx = {
    id: uid(), type, amount: parseFloat(FORM.amount), category: FORM.category,
    person: FORM.person, notes: FORM.notes, date: now.toISOString().slice(0,10),
    time: now.toLocaleTimeString(LANG==='ta'?'ta-IN':'en-IN',{hour:'2-digit',minute:'2-digit'}), ts: now.getTime(),
    photo: FORM.photo || null
  };
  STATE.transactions.push(tx);
  persist();
  showCheck(t('saved'));
  if(addAnother){ resetForm(); setTimeout(()=>{ render(); openScreen(type==='in'?'moneyIn':'moneyOut'); }, 250); }
  else { setTimeout(()=> navigate('home'), 250); }
}

function handleEditTxStart(id){
  const x = STATE.transactions.find(tx=>tx.id===id);
  if(!x) return;
  FORM = { amount:String(x.amount), category:x.category, person:x.person||'', phone:'', notes:x.notes||'', catList:[], editId:x.id, photo:x.photo||null, showAddCat:false };
  openScreen(x.type==='in' ? 'moneyIn' : 'moneyOut');
}

function handleSaveCredit(kind, addAnother){
  if(!validAmount()){ showToast(LANG==='ta'?'சரியான தொகையை உள்ளிடவும்':'Please enter a valid amount'); return; }
  if(!FORM.person){ showToast(LANG==='ta'?'பெயரை உள்ளிடவும்':'Please enter a name'); return; }
  const now = new Date();
  const c = {
    id: uid(), type: kind, customer: FORM.person, phone: FORM.phone, amount: parseFloat(FORM.amount),
    date: now.toISOString().slice(0,10), notes: FORM.notes, ts: now.getTime()
  };
  STATE.credits.push(c);
  if(kind==='received'){
    // credit received = money coming back in, also log as income-ish cash inflow via payments ledger against a synthetic self credit is overkill;
    // simplest correct model: received credit adds directly to cash in hand as a transaction of type 'in' tagged Credit Received
    STATE.transactions.push({ id: uid(), type:'in', amount: c.amount, category:'Credit Received', person: c.customer, notes: c.notes, date: c.date, time: now.toLocaleTimeString(LANG==='ta'?'ta-IN':'en-IN',{hour:'2-digit',minute:'2-digit'}), ts: now.getTime() });
  }
  persist();
  showCheck(t('saved'));
  if(addAnother){ resetForm(); setTimeout(()=>{ render(); openScreen(kind==='given'?'creditGiven':'creditReceived'); }, 250); }
  else { setTimeout(()=> navigate('credit'), 250); }
}

function handleSavePayment(creditId, addAnother){
  if(!validAmount()){ showToast(LANG==='ta'?'சரியான தொகையை உள்ளிடவும்':'Please enter a valid amount'); return; }
  const now = new Date();
  STATE.payments.push({ id: uid(), creditId, amount: parseFloat(FORM.amount), date: now.toISOString().slice(0,10), ts: now.getTime() });
  persist();
  showCheck(t('saved'));
  if(addAnother){ resetForm(); setTimeout(()=>{ render(); openScreen('recordPayment', {id:creditId}); }, 250); }
  else { setTimeout(()=> navigate('credit'), 250); }
}

function handleDeleteTx(id){
  const idx = STATE.transactions.findIndex(x=>x.id===id);
  if(idx<0) return;
  const removed = STATE.transactions[idx];
  STATE.transactions.splice(idx,1);
  persist();
  closeScreen();
  navigate('transactions');
  showToast(t('deleted'), t('undo'), ()=>{
    STATE.transactions.push(removed);
    persist();
    render();
  });
}

function handleDeleteCredit(id){
  const idx = STATE.credits.findIndex(c=>c.id===id);
  if(idx<0) return;
  const removed = STATE.credits[idx];
  const removedPayments = STATE.payments.filter(p=>p.creditId===id);
  // credit received was logged as a synthetic 'in' transaction tagged Credit Received; clean that up too
  let removedTx = null;
  if(removed.type==='received'){
    const txIdx = STATE.transactions.findIndex(x=> x.category==='Credit Received' && x.person===removed.customer && x.amount===removed.amount && x.date===removed.date);
    if(txIdx>=0){ removedTx = STATE.transactions[txIdx]; STATE.transactions.splice(txIdx,1); }
  }
  STATE.credits.splice(idx,1);
  STATE.payments = STATE.payments.filter(p=>p.creditId!==id);
  persist();
  closeScreen();
  navigate('credit');
  showToast(t('deleted'), t('undo'), ()=>{
    STATE.credits.push(removed);
    STATE.payments.push(...removedPayments);
    if(removedTx) STATE.transactions.push(removedTx);
    persist();
    render();
  });
}

function doRestore(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      STATE.settings = data.settings || STATE.settings;
      STATE.transactions = data.transactions || [];
      STATE.credits = data.credits || [];
      STATE.payments = data.payments || [];
      persist();
      showToast(LANG==='ta'?'தரவு மீட்டமைக்கப்பட்டது':'Data restored successfully');
      render();
    }catch(err){ showToast(LANG==='ta'?'கோப்பு படிக்க முடியவில்லை':'Could not read backup file'); }
  };
  reader.readAsText(file);
}
function shareClosing(){
  const tx = todaysTx();
  const inc = sumBy(tx,'in'), exp = sumBy(tx,'out');
  const gstLine = STATE.settings.gstRate>0 ? `\n${t('gstCollected')}: ${fmtMoney(tx.filter(x=>x.type==='in').reduce((s,x)=> s + gstBreakup(x.amount).gst, 0))}` : '';
  const msg = `*${STATE.settings.businessName}*\n${t('today')}: ${new Date().toLocaleDateString()}\n\n${t('income')}: ${fmtMoney(inc)}\n${t('expense')}: ${fmtMoney(exp)}\n${t('profit')}: ${fmtMoney(inc-exp)}\n${t('pending')}: ${fmtMoney(pendingCreditTotal())}${gstLine}`;
  const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}
function exportCsv(){
  const tx = rangeTx();
  const gstOn = STATE.settings.gstRate>0;
  let csv = gstOn ? 'Date,Time,Type,Category,Person,Amount,Taxable Value,GST Amount,Notes\n' : 'Date,Time,Type,Category,Person,Amount,Notes\n';
  tx.forEach(x=>{
    const dateCell = '="'+x.date+'"'; // forces Excel/Sheets to keep this as literal text, not an auto-formatted date
    const row = [dateCell,x.time||'',x.type,x.category,x.person||'',x.amount];
    if(gstOn){ const g = gstBreakup(x.amount); row.push(g.taxable.toFixed(2), g.gst.toFixed(2)); }
    row.push((x.notes||'').replace(/,/g,';'));
    csv += row.join(',')+'\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'transactions-'+REPORT_RANGE+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  showToast(LANG==='ta'?'CSV பதிவிறக்கப்பட்டது':'CSV downloaded');
}

function sendReminder(creditId){
  const c = STATE.credits.find(cr=>cr.id===creditId);
  if(!c) return;
  const rem = Number(c.amount) - creditPaidAmount(c.id);
  const msg = LANG==='ta'
    ? `வணக்கம் ${c.customer}, ${STATE.settings.businessName} இடம் உங்கள் நிலுவை தொகை ${fmtMoney(rem)}. தயவுசெய்து விரைவில் செலுத்தவும். நன்றி!`
    : `Hi ${c.customer}, this is a reminder from ${STATE.settings.businessName} that ${fmtMoney(rem)} is pending. Please settle it at your earliest convenience. Thank you!`;
  const phoneClean = (c.phone||'').replace(/[^0-9]/g,'');
  const url = 'https://wa.me/' + phoneClean + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function exportDailyClosingPdf(){
  if(!window.jspdf || !window.jspdf.jsPDF){ showToast('PDF library not available, try again in a moment'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const tx = todaysTx();
  const inc = sumBy(tx,'in'), exp = sumBy(tx,'out');
  doc.setFontSize(16);
  doc.text(STATE.settings.businessName || 'My Shop', 14, 18);
  doc.setFontSize(10);
  doc.text(new Date().toLocaleDateString(LANG==='ta'?'ta-IN':'en-IN'), 14, 25);
  let y = 38;
  doc.setFontSize(12);
  doc.text(t('income')+': '+fmtMoney(inc), 14, y); y+=8;
  doc.text(t('expense')+': '+fmtMoney(exp), 14, y); y+=8;
  doc.text(t('profit')+': '+fmtMoney(inc-exp), 14, y); y+=8;
  doc.text(t('pending')+': '+fmtMoney(pendingCreditTotal()), 14, y); y+=8;
  if(STATE.settings.gstRate>0){
    const gstTotal = tx.filter(x=>x.type==='in').reduce((s,x)=> s + gstBreakup(x.amount).gst, 0);
    doc.text(t('gstCollected')+': '+fmtMoney(gstTotal), 14, y); y+=8;
  }
  y+=6;
  doc.setFontSize(11);
  doc.text(t('transactions')+':', 14, y); y+=8;

  if(!tx.length){ doc.text('—', 14, y); }
  tx.forEach(x=>{

    const line = (x.time||'')+'  '+x.category+(x.person? ' ('+x.person+')':'')+'  '+(x.type==='in'?'+':'-')+fmtMoney(x.amount);
    doc.text(line, 14, y);
    y+=6;
  });
  doc.save('daily-closing-'+todayStr()+'.pdf');
  showToast(LANG==='ta'?'PDF பதிவிறக்கப்பட்டது':'PDF downloaded');

/* ---------- Voice input (Web Speech API, best-effort) ---------- */
let VOICE_ACTIVE = false;
function tryVoiceInput(onResult, onDone){
  const finish = (transcript)=>{ VOICE_ACTIVE = false; onResult(transcript); if(onDone) onDone(); };

  if(VOICE_ACTIVE){ return; } // ignore rapid double-taps while already listening

  // getUserMedia/SpeechRecognition require a secure context (https, or localhost).
  // A PWA opened directly from a zip (file://) will silently fail here.
  if(window.isSecureContext === false || (location.protocol!=='https:' && location.hostname!=='localhost' && location.protocol!=='app:' && location.protocol!=='capacitor:')){
    showToast(LANG==='ta' ? 'குரல் உள்ளீடு பயன்படுத்த, ஆப்-ஐ https வழியாக திறக்கவும்' : 'Voice input needs the app opened over https (not directly from a file) — please type the amount instead');
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast(LANG==='ta' ? 'இந்த உலாவியில் குரல் உள்ளீடு இல்லை' : 'Voice input is not supported on this browser'); return; }

  let rec;
  try{
    rec = new SR();
  }catch(err){
    showToast(LANG==='ta' ? 'குரல் உள்ளீடு தொடங்க முடியவில்லை' : 'Could not start voice input, please type instead');
    return;
  }

  rec.lang = LANG==='ta' ? 'ta-IN' : 'en-IN';
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  let handled = false;
  rec.onresult = (e)=>{ handled = true; finish(e.results[0][0].transcript); };
  rec.onerror = (e)=>{
    handled = true;
    const code = e && e.error;
    let msg;
    if(code==='not-allowed' || code==='service-not-allowed'){
      msg = LANG==='ta' ? 'மைக் அனுமதி மறுக்கப்பட்டது, அமைப்புகளில் அனுமதிக்கவும்' : 'Microphone permission denied — allow mic access in your browser/app settings';
    } else if(code==='no-speech'){
      msg = LANG==='ta' ? 'எதுவும் கேட்கவில்லை, மீண்டும் முயற்சிக்கவும்' : 'Did not catch that, please try again';
    } else if(code==='audio-capture'){
      msg = LANG==='ta' ? 'மைக்ரோஃபோன் கிடைக்கவில்லை' : 'No microphone found on this device';
    } else if(code==='network'){
      msg = LANG==='ta' ? 'இணைய சிக்கல், தட்டச்சு செய்யவும்' : 'Network issue with voice input, please type instead';
    } else {
      msg = LANG==='ta' ? 'குரல் உள்ளீடு தோல்வியடைந்தது, தட்டச்சு செய்யவும்' : 'Voice input failed, please type instead';
    }
    showToast(msg);
    finish('');
  };
  rec.onend = ()=>{ if(!handled) finish(''); };

  VOICE_ACTIVE = true;
  try{
    rec.start();
  }catch(err){
    // e.g. InvalidStateError if a recognition session is somehow already active
    showToast(LANG==='ta' ? 'குரல் உள்ளீடு தொடங்க முடியவில்லை, தட்டச்சு செய்யவும்' : 'Could not start voice input, please type instead');
    finish('');
  }
}

/* ---------- Init ---------- */
if(!STATE.transactions.length && !localStorage.getItem('ll_seeded')){
  // seed with a couple of friendly sample entries so first-run isn't empty
  localStorage.setItem('ll_seeded','1');
}
render();

/* ---------- PWA: register service worker (enables install + offline use) ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline install not available, app still works normally */ });
  });
}
</script>
</body>
</html>
